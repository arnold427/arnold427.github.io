<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Address Jigger</title>
    <!-- Main CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
        crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css?family=Quicksand:500" rel="stylesheet" />
    <link rel="icon" href="img/favicon.png">
    <!-- Page Specific CSS -->
    <style type="text/css">
    @import url(https://fonts.googleapis.com/css?family=Source+Sans+Pro:200,300);

    @prim: #53e3a6;

    *{
    	box-sizing: border-box;
    	margin: 0;
    	padding: 0;

    	font-weight: 300;
    }

    body{
    	font-family: 'Source Sans Pro', sans-serif;
    	color: white;
    	font-weight: 300;

    	::-webkit-input-placeholder { /* WebKit browsers */
    		font-family: 'Source Sans Pro', sans-serif;
    			color:    white;
    		font-weight: 300;
    	}
    	:-moz-placeholder { /* Mozilla Firefox 4 to 18 */
    		font-family: 'Source Sans Pro', sans-serif;
    		 color:    white;
    		 opacity:  1;
    		font-weight: 300;
    	}
    	::-moz-placeholder { /* Mozilla Firefox 19+ */
    		font-family: 'Source Sans Pro', sans-serif;
    		 color:    white;
    		 opacity:  1;
    		font-weight: 300;
    	}
    	:-ms-input-placeholder { /* Internet Explorer 10+ */
    		font-family: 'Source Sans Pro', sans-serif;
    		 color:    white;
    		font-weight: 300;
    	}
    }

    .wrapper{
    	background: #50a3a2;
    background: -webkit-linear-gradient(top left, #50a3a2 0%, #53e3a6 100%);
    background: -moz-linear-gradient(top left, #50a3a2 0%, #53e3a6 100%);
    background: -o-linear-gradient(top left, #50a3a2 0%, #53e3a6 100%);
    background: linear-gradient(to bottom right, #50a3a2 0%, #53e3a6 100%);

    	position: absolute;
    	top: 50%;
    	left: 0;
    	width: 100%;
    	height: 400px;
    	margin-top: -200px;
    	overflow: hidden;

    	&.form-success{
    		.container{
    			h1{
    				transform: translateY(85px);
    			}
    		}
    	}
    }

    .container{
    	max-width: 600px;
    	margin: 0 auto;
    	padding: 80px 0;
    	height: 400px;
    	text-align: center;

    	h1{
    		font-size: 40px;
    		transition-duration: 1s;
    		transition-timing-function: ease-in-put;
    		font-weight: 200;
    	}
    }

    form{
    	padding: 20px 0;
    	position: relative;
    	z-index: 2;

    	input{
    		display: block;
    		appearance: none;
    		outline: 0;
    		border: 1px solid fade(white, 40%);
    		background-color: fade(white, 20%);
    		width: 250px;

    		border-radius: 3px;
    		padding: 10px 15px;
    		margin: 0 auto 10px auto;
    		display: block;
    		text-align: center;
    		font-size: 18px;

    		color: white;

    		transition-duration: 0.25s;
    		font-weight: 300;

    		&:hover{
    			background-color: fade(white, 40%);
    		}

    		&:focus{
    			background-color: white;
    			width: 300px;

    			color: @prim;
    		}
    	}

    	button{
    		appearance: none;
    		outline: 0;
    		background-color: white;
    		border: 0;
    		padding: 10px 15px;
    		color: @prim;
    		border-radius: 3px;
    		width: 250px;
    		cursor: pointer;
    		font-size: 18px;
    		transition-duration: 0.25s;

    		&:hover{
    			background-color: rgb(245, 247, 249);
    		}
    	}
    }

    .bg-bubbles{
    	position: absolute;
    	top: 0;
    	left: 0;
    	width: 100%;
    	height: 100%;

    	z-index: 1;

    	li{
    		position: absolute;
    		list-style: none;
    		display: block;
    		width: 40px;
    		height: 40px;
    		background-color: fade(white, 15%);
    		bottom: -160px;

    		-webkit-animation: square 25s infinite;
    		animation:         square 25s infinite;

    		-webkit-transition-timing-function: linear;
    		transition-timing-function: linear;

    		&:nth-child(1){
    			left: 10%;
    		}

    		&:nth-child(2){
    			left: 20%;

    			width: 80px;
    			height: 80px;

    			animation-delay: 2s;
    			animation-duration: 17s;
    		}

    		&:nth-child(3){
    			left: 25%;
    			animation-delay: 4s;
    		}

    		&:nth-child(4){
    			left: 40%;
    			width: 60px;
    			height: 60px;

    			animation-duration: 22s;

    			background-color: fade(white, 25%);
    		}

    		&:nth-child(5){
    			left: 70%;
    		}

    		&:nth-child(6){
    			left: 80%;
    			width: 120px;
    			height: 120px;

    			animation-delay: 3s;
    			background-color: fade(white, 20%);
    		}

    		&:nth-child(7){
    			left: 32%;
    			width: 160px;
    			height: 160px;

    			animation-delay: 7s;
    		}

    		&:nth-child(8){
    			left: 55%;
    			width: 20px;
    			height: 20px;

    			animation-delay: 15s;
    			animation-duration: 40s;
    		}

    		&:nth-child(9){
    			left: 25%;
    			width: 10px;
    			height: 10px;

    			animation-delay: 2s;
    			animation-duration: 40s;
    			background-color: fade(white, 30%);
    		}

    		&:nth-child(10){
    			left: 90%;
    			width: 160px;
    			height: 160px;

    			animation-delay: 11s;
    		}
    	}
    }

    @-webkit-keyframes square {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-700px) rotate(600deg); }
    }
    @keyframes square {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-700px) rotate(600deg); }
    }


        .loginInput {
            border: none;
            outline: none;
            width: 100%
        }

        .formControl {
            padding: 6px 12px;
        }

        .formGroup {
            width: 100%;
            border-bottom: 2px solid rgba(135, 212, 233, 1);
            position: relative;
            margin-bottom: 15px;
        }

        .lineFocus {
            position: absolute;
            display: block;
            height: 100%;
            width: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .lineFocus::before {
            content: "";
            display: block;
            position: absolute;
            bottom: -2px;
            height: 2px;
            background: red;
            left: 0;
            width: 0;
            -webkit-transition: all 0.4s;
            -o-transition: all 0.4s;
            -moz-transition: all 0.4s;
            transition: all 0.4s;
        }

        .formControl:focus+.lineFocus::after {
            top: -22px;
            font-size: 18px;
        }

        .formControl:focus+.lineFocus::before {
            width: 100%;
        }

        .has-val.formControl+.lineFocus::after {
            top: -22px;
            font-size: 18px;
        }

        .btn-danger {
            background-color: rgba(135, 212, 233, 1);
            border-color: black;
        }

        .btn-danger:hover {
            background-color: rgba(135, 212, 233, 1);
            border-color: black;
        }
    </style>
    <!-- Script Files -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/places.js@1.7.3"></script>
    <script src="js/jig.js"></script>
    <script>
        $(function () {
            addressForm = $("#address-form");
            addressInput = $("#address-input");
            address2Input = $("#address2-input");
            addressJigs = $("#address-jigs");
            addressForm.on("submit", function (e) {
                e.preventDefault();
                addressString = addressInput.val().split(",")[0];
                address2String = address2Input.val();
                if (!address2String.isEmpty()) {
                    addressString = addressString + "\n" + address2String;
                }
                addresses = jigAddress(addressString);
                unitAddresses = addUnitsToAddresses(addresses);
                html = createListFromAddresses(addresses);
                html += createListFromAddresses(unitAddresses);
                html += createListFromAddresses(addPrefixesToAddresses(addresses));
                html += createListFromAddresses(addPrefixesToAddresses(unitAddresses));
                addressJigs.html(html);
            });
            var placesAutocomplete = places({
                container: document.querySelector('#address-input')
            });
            function createListFromAddresses(addresses) {
                html = "";
                if (addresses.size > 0) {
                    html = "<div class=\"col-md-3\"><ul class=\"list-group\">";
                    addresses.forEach(address => {
                        addressParts = address.split("\n");
                        html += "<li style=\"white-space: nowrap;\" class=\"list-group-item\">";
                        addressParts.forEach(addressPart => {
                            html += addressPart + "<br/>";
                        });
                        html += "</li>";
                    });
                    html += "</ul></div>";
                }
                return html;
            }
            addressInput.on('keydown', function (e) {
                var key = e.which || e.keyCode;
                if (key == 9) {
                    address2Input.focus();
                } else if (key == 13) {
                    addressForm.submit();
                }
            });
            String.prototype.isEmpty = function () {
                return this.length === 0 || !this.trim();
            };
        });
    </script>
</head>

<body style="font-family: 'Quicksand', sans-serif;">
  <div class="wrapper">
    <div class="container">
        <div class="col-md-8 col-md-offset-2">
            <div class="panel">
                <div class="panel-body">
                    <div class="text-center">
                        <img class="img-circle" src="img/chef-arnold.png" alt="Chef Arnold Logo" width="150" height="150"/>
                    </div>
                    <h2 class="text-center">Address Jigger</h2>
                    <form id="address-form" class="validate-form">
                        <div class="formGroup validate-input" data-validate="Valid address is required.">
                            <input class="formControl loginInput" id="address-input" type="search" placeholder="address" name="Address Line 1" required="required"
                                autofocus="autofocus" />
                            <span class="lineFocus" data-placeholder="&#xf2c2;"></span>
                        </div>
                        <div class="formGroup validate-input">
                            <input class="formControl loginInput" value="" id="address2-input" type="text" placeholder="Address Line 2" name="address2"
                            />
                            <span class="lineFocus" data-placeholder="&#xf2c2;"></span>
                        </div>
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-danger btn-block">Jig Me</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <ul class="bg-bubbles">
		<li></li>
		<li></li>
		<li></li>
		<li></li>
		<li></li>
		<li></li>
		<li></li>
		<li></li>
		<li></li>
		<li></li>
	</ul>
  </div>
    <div id="address-jigs" class="fluid-container">
    </div>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>

</html>
